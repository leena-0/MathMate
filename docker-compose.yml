services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ghcr.io/leena-0/mathmate-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/leena-0/mathmate-frontend:latest
    ports:
      - "8501:8501"
    environment:
      - MATHMATE_BACKEND_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
