name: CD

# CI(테스트)가 main에서 성공적으로 끝난 뒤에만 배포한다.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/mathmate-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/mathmate-frontend

jobs:
  build:
    name: Build & Push to GHCR
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    name: Deploy to Compute Engine
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 GCE VM에서 최신 이미지 pull 후 재기동
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -e   # 아래 명령 중 하나라도 실패하면 즉시 중단하고 CD를 실패로 표시한다
            cd ${{ vars.GCE_DEPLOY_PATH || '~/MathMate' }}
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker compose images
            docker image prune -af    # 안 쓰는 예전 이미지 정리 (디스크 부족 재발 방지)
            docker builder prune -af
            df -h /

  summary:
    name: Deployment Summary
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: 배포 확인 및 요약 작성
        run: |
          curl -sf "http://${{ secrets.GCE_HOST }}:8000/api/health"
          {
            echo "### ✅ 배포 완료"
            echo "- API: http://${{ secrets.GCE_HOST }}:8000"
            echo "- Frontend: http://${{ secrets.GCE_HOST }}:8501"
            echo "- Image: \`${{ env.IMAGE_API }}:${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
