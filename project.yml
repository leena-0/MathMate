project:
  title: MathMate
  summary: 정답을 알려주지 않고 힌트로만 유도하는 초등 수학 소크라테스식 튜터
  category: AI 교육 서비스
  keywords:
    - AI
    - Education
    - LLMOps

problem:
  summary: 시중 AI 튜터가 정답을 바로 알려줘 초등 고학년 학생의 수학적 사고력 형성을 방해한다.
  target_users:
    - 초등학교 4~6학년 학생
    - 수포자(수학 포기자) 예방이 필요한 학부모·교사

solution:
  summary: LangGraph 에이전트가 학생의 풀이를 진단해 정답 대신 단계적 힌트와 되질문으로만 스스로 답에 도달하도록 유도한다.
  main_features:
    - 소크라테스식 대화(정답 미노출, 단계적 힌트 1~3단계)
    - 답 유출 방지 가드레일(입력 의도분류 + 출력 직전 재검증, 이중화)
    - 오답 진단 이중검증 및 학생 맞춤형 힌트/해설 생성
    - 힌트 사용량·난이도별 정답률 기반 단원별 진척도 리포트
    - 실시간 SSE 스트리밍 채팅 UI(Streamlit)
    - Solar API 장애 시 Gemini 폴백 + Mock 규칙 자동 복구(LLMOps)

tech_stack:
  frontend:
    - Streamlit
  backend:
    - FastAPI
    - LangGraph
  ai:
    - Solar API (Upstage)
    - Gemini (폴백)
    - LiteLLM
    - Langfuse
  database:
    - Supabase (PostgreSQL, REST)
  infra:
    - Docker
    - GCP Compute Engine
    - GitHub Actions

